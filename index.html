<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.css">
</head>
<body>
    <cast-media-player></cast-media-player>
    <script type="text/javascript" src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // On intercepte la requête de chargement
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            loadRequestData => {
                // On force le protocole si nécessaire
                let url = loadRequestData.media.contentId;
                
                // On tente de modifier la requête réseau pour paraître "normal"
                const playbackConfig = createPlaybackConfig(playerManager.getPlaybackConfig());
                
                // IMPORTANT: On force le type de flux
                loadRequestData.media.contentType = 'video/mp4';
                
                return loadRequestData;
            }
        );

        // Cette fonction va essayer de forcer le passage
        function createPlaybackConfig(playbackConfig) {
            playbackConfig.manifestRequestHandler = requestInfo => {
                requestInfo.withCredentials = true;
            };
            playbackConfig.segmentRequestHandler = requestInfo => {
                requestInfo.withCredentials = true;
            };
            return playbackConfig;
        }

        const options = new cast.framework.CastReceiverOptions();
        // On autorise explicitement le HTTP non sécurisé
        options.disableIdleTimeout = true;
        
        context.start(options);
    </script>
</body>
</html>
